name: terraform validate

on:
    workflow_call:

permissions:
  contents: read
  pull-requests: read
jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform_version: [~>1.9.0, ~>1.10.0, ~>1.11.0, ~>1.12.0, ~>1.13.0]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b0cc02d63867e0daaa034a47e2cdf5d525a863a1 # v3.1.2
        with:
          terraform_version: ${{ matrix.terraform_version }}
      - name: Initialize Terraform
        run: terraform init
      - name: Validate Terraform
        run: terraform validate
