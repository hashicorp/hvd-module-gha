name: terraform validate

on:
    workflow_call:

permissions:
  contents: read
  pull-requests: read
jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform_version: [~>1.9.0, ~>1.10.0, ~>1.11.0, ~>1.12.0, ~>1.13.0]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5b1ab0e78ebe92dd62371fe966bbcaade67a56bd # v3.1.2
        with:
          terraform_version: ${{ matrix.terraform_version }}
      - name: Initialize Terraform
        run: terraform init
      - name: Validate Terraform
        run: terraform validate
